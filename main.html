<!DOCTYPE html>
<html lang="th">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>

</head>
<body>

  <!-- ปุ่มมุมบนซ้าย/ขวา -->
  <div class="top-bar">
    <button>←</button>
    <button>⚙</button>
  </div>

  <!-- รูปโปรไฟล์ + ชื่อ -->
  <div class="profile">
    <div class="avatar-wrapper" id="avatar">
    <img id="profileImg" src="Pictures/น้องมัจฉะ.gif" alt="profile"
     onerror="this.style.display='none';document.getElementById('fallback').style.display='flex'">
    <div class="fallback" id="fallback">T</div>
  </div>
    <h1>Teawpie</h1>
    <p>@username</p>

  <!-- Context Menu -->
  <div id="ctxMenu">
      <div class="menu-item" id="changeBtn">
        <svg viewBox="0 0 24 24"><path d="M12 5v2m0 10v2m7-7h-2M7 12H5m15.364-4.364l-1.414 1.414M6.05 17.95l-1.414 1.414M17.95 17.95l-1.414-1.414M6.05 6.05L4.636 4.636"/></svg>
        เปลี่ยนรูปโปรไฟล์
      </div>
      <div class="menu-divider"></div>
      <div class="menu-item danger" id="resetBtn">
        <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
        รีเซ็ตรูป
      </div>
    </div>

   <input type="file" id="fileInput" accept="image/*" style="display:none;">

   <script src="script.js"></script>
  </div>

  <!-- สามช่องแนวนอน -->
<div class="info-grid">
  <div class="card">
    <a href="https://www.instagram.com/teawpie" target="_blank">
    <img src="icon/instagram.png" alt="Instagram" width="20">
    </a>
</div>
  <div class="card">
    <a href="https://Line.me/ti/p/~honeypie_001" target="_blank">
    <img src="icon/line.png" alt="Line" width="20">
    </a>
</div>
  <div class="card">
    <a href="https://www.tiktok.com/@teawpie" target="_blank">
    <img src="icon/tik-tok.png" alt="TikTok" width="20">
    </a>
</div>
</div>

    <!-- ส่วนสินค้า -->
<div class="shop-section">
  <p class="shop-label">🛍 สินค้า</p>
  <div class="product-grid" id="productGrid">

    <!-- การ์ดสินค้า (copy ซ้ำเพื่อเพิ่ม) -->
    <a class="product-card" href="ใส่ลิงก์ที่นี่" target="_blank">
      <div class="product-img">
        <img src="ใส่รูปที่นี่" alt="ชื่อสินค้า">
      </div>
      <div class="product-info">
        <p class="product-name">ชื่อสินค้า</p>
        <p class="product-price"><span>฿ 000</span></p>
      </div>
    </a>

  </div>
  
</div>

</body>
</html>
